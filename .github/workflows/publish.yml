name: publish

on:
  push:
    tags: ["v*.*.*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    # OIDC trusted publishing to npm — no NPM_TOKEN secret.
    # Requires Trusted Publisher configured at
    # https://www.npmjs.com/package/supabase-realtime-skill/access
    # pointing at this repo + this workflow file.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      # Node ≥ 22.14 + npm ≥ 11.5.1 are required for OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test:fast
      - run: bun run build
      - run: npm publish --provenance --access public
