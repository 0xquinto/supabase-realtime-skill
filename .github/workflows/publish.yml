name: publish

on:
  push:
    tags: ["v*.*.*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    # OIDC trusted publishing to npm — no NPM_TOKEN secret.
    # Requires Trusted Publisher configured at
    # https://www.npmjs.com/package/supabase-realtime-skill/access
    # pointing at this repo + this workflow file.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      # OIDC trusted publishing needs npm ≥ 11.5.1. Node 24 ships npm 11 by
      # default, so we don't have to self-upgrade npm (which is fragile —
      # `npm install -g npm@latest` against the bundled 10.x in node 22 hits
      # a known MODULE_NOT_FOUND in arborist's promise-retry resolution).
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test:fast
      - run: bun run build
      - run: npm publish --provenance --access public
