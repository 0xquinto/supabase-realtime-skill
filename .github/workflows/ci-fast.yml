name: ci-fast

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test:fast

  ci-fast-eval:
    runs-on: ubuntu-latest
    needs: fast
    env:
      EVAL_SUPABASE_PAT: ${{ secrets.EVAL_SUPABASE_PAT }}
      EVAL_HOST_PROJECT_REF: ${{ secrets.EVAL_HOST_PROJECT_REF }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      # GitHub Actions disallows `secrets.X` in job-level `if:` for security;
      # gate via a step output instead so forks/PRs without eval secrets
      # cleanly skip rather than fail the whole workflow.
      - name: Check eval secrets
        id: have
        run: |
          if [ -n "$EVAL_SUPABASE_PAT" ] && [ -n "$EVAL_HOST_PROJECT_REF" ]; then
            echo "secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::eval secrets not configured; skipping ci-fast-eval"
          fi
      - if: steps.have.outputs.secrets == 'true'
        uses: actions/checkout@v4
      - if: steps.have.outputs.secrets == 'true'
        uses: oven-sh/setup-bun@v1
      - if: steps.have.outputs.secrets == 'true'
        run: bun install --frozen-lockfile
      - if: steps.have.outputs.secrets == 'true'
        run: bun run eval/runner.ts ci-fast
      - if: ${{ always() && steps.have.outputs.secrets == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-fast-report
          path: eval/reports/
